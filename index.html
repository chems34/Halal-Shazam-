<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aya - Reconnaissance Coranique</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a0a;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    text-align: center;
    padding: 20px;
    max-width: 400px;
    width: 100%;
  }

  .logo {
    font-size: 48px;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 5px;
  }

  .subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 50px;
  }

  .btn-listen {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 0 40px rgba(0, 114, 255, 0.4);
    margin-bottom: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 0 auto 30px auto;
  }

  .btn-listen:hover {
    transform: scale(1.05);
    box-shadow: 0 0 60px rgba(0, 114, 255, 0.6);
  }

  .btn-listen.listening {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    box-shadow: 0 0 60px rgba(255, 65, 108, 0.6);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .mic-icon { font-size: 40px; }

  .status {
    color: #888;
    font-size: 14px;
    margin-bottom: 30px;
    min-height: 20px;
  }

  .result-card {
    background: #111;
    border: 1px solid #222;
    border-radius: 20px;
    padding: 25px;
    display: none;
    text-align: right;
  }

  .result-card.show { display: block; }

  .surah-name {
    font-size: 22px;
    font-weight: 800;
    color: #00c6ff;
    margin-bottom: 5px;
  }

  .ayah-number {
    font-size: 13px;
    color: #555;
    margin-bottom: 15px;
  }

  .arabic-text {
    font-size: 24px;
    line-height: 1.8;
    color: #fff;
    margin-bottom: 15px;
    font-family: 'Traditional Arabic', serif;
  }

  .confidence {
    font-size: 12px;
    color: #333;
    text-align: left;
  }

  .confidence span {
    color: #00c6ff;
    font-weight: 700;
  }

  .error-card {
    background: #1a0a0a;
    border: 1px solid #330000;
    border-radius: 20px;
    padding: 20px;
    display: none;
    color: #ff6b6b;
    font-size: 14px;
  }

  .error-card.show { display: block; }

  .tip {
    background: #0f0f1a;
    border: 1px solid #1a1a3a;
    border-radius: 12px;
    padding: 15px;
    font-size: 12px;
    color: #555;
    margin-top: 20px;
    text-align: right;
    line-height: 1.8;
  }

  .tip strong { color: #00c6ff; }

  footer {
    position: fixed;
    bottom: 20px;
    font-size: 12px;
    color: #333;
  }

  footer span { color: #00c6ff; }

  .wave {
    display: none;
    gap: 4px;
    justify-content: center;
    align-items: center;
    height: 30px;
    margin-bottom: 20px;
  }

  .wave.show { display: flex; }

  .wave-bar {
    width: 4px;
    background: #00c6ff;
    border-radius: 2px;
    animation: wave 1s infinite ease-in-out;
  }

  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; }

  @keyframes wave {
    0%, 100% { height: 8px; }
    50% { height: 28px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">☪️</div>
  <h1>Aya</h1>
  <p class="subtitle">Reconnaissance Coranique en temps réel</p>

  <button class="btn-listen" id="btn" onclick="toggleListen()">
    <span class="mic-icon">🎙️</span>
    <span id="btn-text">Écouter</span>
  </button>

  <div class="wave" id="wave">
    <div class="wave-bar" style="height:8px"></div>
    <div class="wave-bar" style="height:8px"></div>
    <div class="wave-bar" style="height:8px"></div>
    <div class="wave-bar" style="height:8px"></div>
    <div class="wave-bar" style="height:8px"></div>
  </div>

  <p class="status" id="status">Appuie pour identifier une récitation</p>

  <div class="result-card" id="result">
    <div class="surah-name" id="surah-name"></div>
    <div class="ayah-number" id="ayah-number"></div>
    <div class="arabic-text" id="arabic-text"></div>
    <div class="confidence">Confiance : <span id="confidence-val"></span></div>
  </div>

  <div class="error-card" id="error">
    <p id="error-msg"></p>
  </div>

  <div class="tip">
    <strong>💡 Comment utiliser :</strong><br>
    1. Mets la vidéo en <strong>haut-parleur</strong><br>
    2. Appuie sur <strong>Écouter</strong><br>
    3. Approche ton téléphone de tes <strong>oreilles</strong><br>
    4. Attends 5 secondes
  </div>
</div>

<footer>Créé par <span>Assakour</span></footer>

<script>
const GROQ_API_KEY = "METS_TA_CLE_GROQ_ICI";

// Base de données des sourates
const SURAHS = {
  "الفاتحة": { number: 1, ayahs: ["بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ", "الرَّحْمَٰنِ الرَّحِيمِ", "مَالِكِ يَوْمِ الدِّينِ", "إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ", "اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ", "صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ"] },
  "البقرة": { number: 2, ayahs: ["الم", "ذَٰلِكَ الْكِتَابُ لَا رَيْبَ فِيهِ هُدًى لِّلْمُتَّقِينَ", "الَّذِينَ يُؤْمِنُونَ بِالْغَيْبِ وَيُقِيمُونَ الصَّلَاةَ وَمِمَّا رَزَقْنَاهُمْ يُنفِقُونَ"] },
  "الإخلاص": { number: 112, ayahs: ["قُلْ هُوَ اللَّهُ أَحَدٌ", "اللَّهُ الصَّمَدُ", "لَمْ يَلِدْ وَلَمْ يُولَدْ", "وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ"] },
  "الفلق": { number: 113, ayahs: ["قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ", "مِن شَرِّ مَا خَلَقَ", "وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ", "وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ", "وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ"] },
  "الناس": { number: 114, ayahs: ["قُلْ أَعُوذُ بِرَبِّ النَّاسِ", "مَلِكِ النَّاسِ", "إِلَٰهِ النَّاسِ", "مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ", "الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ", "مِنَ الْجِنَّةِ وَالنَّاسِ"] },
  "الكوثر": { number: 108, ayahs: ["إِنَّا أَعْطَيْنَاكَ الْكَوْثَرَ", "فَصَلِّ لِرَبِّكَ وَانْحَرْ", "إِنَّ شَانِئَكَ هُوَ الْأَبْتَرُ"] },
  "الكافرون": { number: 109, ayahs: ["قُلْ يَا أَيُّهَا الْكَافِرُونَ", "لَا أَعْبُدُ مَا تَعْبُدُونَ", "وَلَا أَنتُمْ عَابِدُونَ مَا أَعْبُدُ", "وَلَا أَنَا عَابِدٌ مَّا عَبَدتُّمْ", "وَلَا أَنتُمْ عَابِدُونَ مَا أَعْبُدُ", "لَكُمْ دِينُكُمْ وَلِيَ دِينِ"] },
  "النصر": { number: 110, ayahs: ["إِذَا جَاءَ نَصْرُ اللَّهِ وَالْفَتْحُ", "وَرَأَيْتَ النَّاسَ يَدْخُلُونَ فِي دِينِ اللَّهِ أَفْوَاجًا", "فَسَبِّحْ بِحَمْدِ رَبِّكَ وَاسْتَغْفِرْهُ إِنَّهُ كَانَ تَوَّابًا"] },
  "آية الكرسي": { number: 2, ayahs: ["اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ"] }
};

let mediaRecorder = null;
let audioChunks = [];
let isListening = false;

function toggleListen() {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

async function startListening() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      audio: { 
        echoCancellation: false,
        noiseSuppression: false,
        sampleRate: 16000
      } 
    });

    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = processAudio;

    mediaRecorder.start();
    isListening = true;

    document.getElementById('btn').classList.add('listening');
    document.getElementById('btn-text').textContent = 'Arrêter';
    document.getElementById('status').textContent = '🎙️ Écoute en cours... (5 secondes)';
    document.getElementById('wave').classList.add('show');
    document.getElementById('result').classList.remove('show');
    document.getElementById('error').classList.remove('show');

    // Auto stop après 5 secondes
    setTimeout(() => {
      if (isListening) stopListening();
    }, 5000);

  } catch(err) {
    showError("❌ Accès au micro refusé. Autorise le micro dans ton navigateur.");
  }
}

function stopListening() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  isListening = false;
  document.getElementById('btn').classList.remove('listening');
  document.getElementById('btn-text').textContent = 'Écouter';
  document.getElementById('wave').classList.remove('show');
  document.getElementById('status').textContent = '⏳ Analyse en cours...';
}

async function processAudio() {
  const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
  
  // Vérifier si audio est suffisant (> 10KB)
  if (audioBlob.size < 10000) {
    showError("🔇 Son trop faible. Mets le haut-parleur au maximum et réessaie.");
    return;
  }

  try {
    const formData = new FormData();
    formData.append('file', audioBlob, 'audio.webm');
    formData.append('model', 'whisper-large-v3');
    formData.append('language', 'ar');
    formData.append('response_format', 'json');

    const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${GROQ_API_KEY}` },
      body: formData
    });

    if (!response.ok) throw new Error('API Error');

    const data = await response.json();
    const transcript = data.text?.trim();

    if (!transcript || transcript.length < 5) {
      showError("🔇 Aucune voix détectée. Rapproche le téléphone et réessaie.");
      return;
    }

    findSurah(transcript);

  } catch(err) {
    showError("❌ Erreur de connexion. Vérifie ta clé API Groq.");
  }
}

function findSurah(transcript) {
  let bestMatch = null;
  let bestScore = 0;

  for (const [surahName, surahData] of Object.entries(SURAHS)) {
    for (let i = 0; i < surahData.ayahs.length; i++) {
      const score = similarity(transcript, surahData.ayahs[i]);
      if (score > bestScore) {
        bestScore = score;
        bestMatch = { surahName, surahData, ayahIndex: i };
      }
    }
  }

  // Seuil minimum de confiance : 35%
  if (bestScore < 0.35) {
    showError("🤔 Récitation non reconnue. Réessaie dans un endroit plus silencieux.");
    return;
  }

  const confidence = Math.round(bestScore * 100);
  showResult(bestMatch, confidence);
}

function similarity(a, b) {
  // Nettoyer les textes
  const clean = str => str.replace(/[^\u0600-\u06FF\s]/g, '').trim();
  const wordsA = clean(a).split(/\s+/);
  const wordsB = clean(b).split(/\s+/);
  
  let matches = 0;
  for (const word of wordsA) {
    if (word.length > 2 && wordsB.some(w => w.includes(word) || word.includes(w))) {
      matches++;
    }
  }
  
  return matches / Math.max(wordsA.length, wordsB.length);
}

function showResult(match, confidence) {
  document.getElementById('surah-name').textContent = `سورة ${match.surahName}`;
  document.getElementById('ayah-number').textContent = `الآية ${match.ayahIndex + 1} • السورة رقم ${match.surahData.number}`;
  document.getElementById('arabic-text').textContent = match.surahData.ayahs[match.ayahIndex];
  document.getElementById('confidence-val').textContent = `${confidence}%`;
  document.getElementById('result').classList.add('show');
  document.getElementById('status').textContent = '✅ Récitation identifiée !';
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error').classList.add('show');
  document.getElementById('status').textContent = 'Appuie pour réessayer';
}
</script>

</body>
</html>
