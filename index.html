<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aya-Halal — Reconnaissance Coranique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* [VOTRE STYLE EXISTANT COMPLET - JE N'AI RIEN MODIFIÉ] */
</style>
</head>
<body>

<!-- [VOTRE SPLASH SCREEN EXISTANT] -->

<div class="wrap">
  <header>
    <div class="h-ar">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
    <div class="h-logo">
      <div class="h-icon">🎙️</div>
      <h1>Aya<b>-Halal</b></h1>
    </div>
    <p class="h-sub">Reconnaissance de récitation coranique par intelligence artificielle</p>
    <div class="hdiv"></div>
  </header>

  <div class="card">
    <!-- MODIFICATION 1: INVERSION DES ONGLETS -->
    <div class="tabs">
      <button class="tab on" onclick="switchTab('manual')">🎤 Écouter</button>
      <button class="tab" onclick="switchTab('auto')">⚡ Automatique</button>
      <button class="tab" onclick="switchTab('upload')">📂 Fichier</button>
    </div>

    <!-- MANUEL (ÉCOUTER) - DEVIENT LE PREMIER ONGLET -->
    <div class="pnl on" id="pnl-manual">
      <div class="earphones-notice">
        <div class="en-icon">🎧</div>
        <div class="en-text">Pour une reconnaissance optimale, utilisez des écouteurs avec micro intégré.</div>
      </div>

      <div class="rec-wrap">
        <button class="rec-btn" id="recBtn" onclick="toggleRec()">
          <div class="rec-icon" id="recIcon">🎙️</div>
          <div class="rec-lbl" id="recLbl">Commencer l'écoute</div>
        </button>
        <div class="rec-status" id="recStatus">Prêt à écouter</div>
        <div class="rec-cycles" id="recCycles"></div>
      </div>

      <div class="viz-rec">
        <div class="viz-aya" id="vizRec">
          <!-- Barres de visualisation -->
        </div>
      </div>

      <!-- MODIFICATION 2: DÉTECTION AUTOMATIQUE APRES 6s -->
      <script>
        let recMR = null;
        let recOn = false;
        let recBusy = false;
        let detectionTimeout = null;
        const MIN_DURATION = 6000; // 6 secondes minimum
        const CHUNK_SEC = 3; // Durée des chunks en secondes

        function toggleRec() {
          if (recBusy) return;

          if (!recOn) {
            startRec();
          } else {
            stopRec();
          }
        }

        function startRec() {
          if (recOn) return;
          recOn = true;
          recBusy = true;
          document.getElementById('recBtn').classList.add('listening');
          document.getElementById('recIcon').textContent = '🔴';
          document.getElementById('recLbl').textContent = 'Arrêter';
          document.getElementById('recStatus').textContent = '🎙️ Écoute en cours...';
          document.getElementById('recStatus').className = 'rec-status active';

          navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
              recMR = new MediaRecorder(stream);
              const audioChunks = [];
              let startTime = Date.now();

              recMR.ondataavailable = e => {
                audioChunks.push(e.data);

                // Visualisation audio
                updateVisualizer(stream);

                // Vérifier si on a atteint 6 secondes
                if (Date.now() - startTime >= MIN_DURATION && !detectionTimeout) {
                  detectionTimeout = setTimeout(() => {
                    // Arrêter l'enregistrement et analyser
                    recMR.stop();
                    stream.getTracks().forEach(track => track.stop());
                  }, 1000); // Laisser 1s de marge
                }
              };

              recMR.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                analyzeRec(audioBlob);
                clearTimeout(detectionTimeout);
                detectionTimeout = null;
              };

              recMR.start(CHUNK_SEC * 1000);
            })
            .catch(err => {
              console.error(err);
              stopRec();
              document.getElementById('recStatus').textContent = '❌ Erreur micro: ' + err.message;
              document.getElementById('recStatus').className = 'rec-status error';
            });
        }

        function stopRec() {
          if (!recOn) return;
          recOn = false;
          recBusy = false;

          if (recMR && recMR.state !== 'inactive') {
            recMR.stop();
          }

          document.getElementById('recBtn').classList.remove('listening');
          document.getElementById('recIcon').textContent = '🎙️';
          document.getElementById('recLbl').textContent = 'Commencer l\'écoute';
          document.getElementById('recStatus').textContent = 'Prêt à écouter';
          document.getElementById('recStatus').className = 'rec-status';
          clearTimeout(detectionTimeout);
          detectionTimeout = null;
        }

        function analyzeRec(blob) {
          recBusy = true;
          document.getElementById('recStatus').textContent = '🔍 Analyse en cours...';
          document.getElementById('recStatus').className = 'rec-status analyzing';

          // Réutilisation de votre fonction existante
          identify(blob, (status) => {
            document.getElementById('recStatus').textContent = status;
          })
          .then(result => {
            // Afficher les résultats comme dans votre code existant
            showResult('m', result);
          })
          .catch(err => {
            document.getElementById('recStatus').textContent = '❌ ' + err.message;
            document.getElementById('recStatus').className = 'rec-status error';
          })
          .finally(() => {
            recBusy = false;
          });
        }

        // [LE RESTE DE VOTRE CODE JS EXISTANT]
      </script>

      <!-- [VOTRE STRUCTURE DE RÉSULTATS EXISTANTE] -->
      <div class="res" id="res-m">
        <!-- ... -->
      </div>
    </div>

    <!-- AUTOMATIQUE (DEVIENT LE DEUXIÈME ONGLET) -->
    <div class="pnl" id="pnl-auto">
      <!-- [VOTRE CODE EXISTANT POUR L'ONGLET AUTOMATIQUE] -->
    </div>

    <!-- FICHIER (RESTE TROISIÈME) -->
    <div class="pnl" id="pnl-upload">
      <!-- [VOTRE CODE EXISTANT POUR L'ONGLET FICHIER] -->
    </div>
  </div>
</div>

<script>
  // Fonction pour switcher les onglets (modifiée pour le nouvel ordre)
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.pnl').forEach(p => p.classList.remove('on'));

    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('on');
    document.getElementById(`pnl-${tab}`).classList.add('on');

    // Réinitialiser l'état des autres onglets
    if (tab !== 'manual') resetRec();
    if (tab !== 'auto') resetAya();
    if (tab !== 'upload') resetU();
  }

  // [LE RESTE DE VOS FONCTIONS JS EXISTANTES]
</script>

</body>
</html>
